name: release-please

# Token: this workflow uses RELEASE_PLEASE_TOKEN (a PAT) so that
# pushes and tags release-please makes trigger downstream workflows
# on the resulting events. Workflows triggered by the default
# GITHUB_TOKEN actor do NOT trigger other workflows — that means
# release.yml (the binary-build pipeline) wouldn't fire on tags
# release-please creates, and ci.yml/lint.yml wouldn't run on
# release-please PRs.
#
# The PAT needs `contents: write` and `pull-requests: write` scopes
# (or, for fine-grained tokens, the equivalent permissions). See
# docs/contributing.md for setup.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  # Release PRs accumulate edits across runs; cancelling mid-update would
  # leave the PR in an inconsistent state.
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
